<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bocado</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0D0701;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .wrap { max-width: 360px; width: 100%; text-align: center; }
    .logo-box {
      width: 96px; height: 96px; margin: 0 auto 24px;
      border-radius: 24px; background: #1A140F; border: 0.5px solid #3D3732;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-box img { width: 60px; height: 60px; }
    h1 { color: #F5E6D3; font-size: 30px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 8px; }
    .sub { color: #A19E9A; font-size: 14px; margin-bottom: 28px; }
    .card { background: #1A140F; border: 0.5px solid #3D3732; border-radius: 16px; padding: 24px 20px; }
    .card .msg { color: #A19E9A; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }

    /* Botón instalar */
    .btn-install {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #D96E11;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 13px 28px;
      border-radius: 12px;
      border: none;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.18s, opacity 0.18s;
      width: 100%;
      justify-content: center;
    }
    .btn-install:hover:not([aria-disabled="true"]) { background: #bf6010; }
    .btn-install[aria-disabled="true"] {
      background: #3D3732;
      color: #6B6762;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* Aviso fuentes desconocidas — solo Android */
    .install-hint {
      display: none;
      color: #6B6762;
      font-size: 11px;
      line-height: 1.5;
      margin-top: 12px;
    }

    /* Aviso no-Android */
    .not-android-msg {
      display: none;
      color: #6B6762;
      font-size: 11px;
      margin-top: 12px;
    }

    .foot { color: #5F5E5A; font-size: 12px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo-box"><img src="/logo.png" alt="Bocado"></div>
    <h1>Bocado</h1>
    <p class="sub">Recetas para compartir y descubrir</p>
    <div class="card">
      <p class="msg">Compartí tus recetas y descubrí las de otros cocineros desde la app Bocado.</p>

      <!-- Botón: href se setea por JS solo en Android -->
      <a id="btn-install" class="btn-install" aria-disabled="true" role="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Instalar
      </a>

      <p id="install-hint" class="install-hint">
        Puede requerirse activar <strong style="color:#A19E9A">Fuentes desconocidas</strong> en Ajustes → Seguridad antes de instalar.
      </p>
      <p id="not-android-msg" class="not-android-msg">
        Disponible solo para Android.
      </p>
    </div>
    <p class="foot">bocado.tech</p>
  </div>

  <script>
    const APK_URL = 'https://links.bocado.tech/downloads/bocado.apk';
    const btn = document.getElementById('btn-install');
    const hint = document.getElementById('install-hint');
    const notAndroid = document.getElementById('not-android-msg');

    const isAndroid = /android/i.test(navigator.userAgent);

    if (isAndroid) {
      btn.href = APK_URL;
      btn.removeAttribute('aria-disabled');
      hint.style.display = 'block';
    } else {
      btn.setAttribute('aria-disabled', 'true');
      notAndroid.style.display = 'block';
    }
  </script>
</body>
</html>
